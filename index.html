<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cookie Clicker Online</title>
<style>
  body { font-family: Arial; text-align: center; background: #f2f2f2; margin: 0; padding: 20px; }
  h1 { font-size: 48px; }
  button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
  input { padding: 8px; margin: 5px; font-size: 16px; }
  #game, #leaderboard { margin-top: 30px; display: none; }
  #leaderboard table { margin: 0 auto; border-collapse: collapse; }
  #leaderboard th, #leaderboard td { padding: 10px 20px; border: 1px solid #333; }
  .upgrade { margin: 10px; }
</style>
</head>
<body>

<h1>🍪 Cookie Clicker Online</h1>

<div id="auth">
  <h2>Login / Sign Up</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="game">
  <h2>Welcome, <span id="userEmail"></span></h2>
  <p>Cookies: <span id="score">0</span></p>
  <button onclick="clickCookie()">Click Cookie 🍪</button>

  <div class="upgrade">
    <h3>Upgrades</h3>
    <button onclick="buyClickUpgrade()">+1 Cookie per Click (Cost: <span id="clickUpgradeCost">50</span>)</button><br>
    <button onclick="buyAutoClicker()">Auto-Clicker +1/sec (Cost: <span id="autoClickerCost">100</span>)</button>
  </div>

  <div>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div id="leaderboard">
  <h2>🏆 Leaderboard</h2>
  <table>
    <thead>
      <tr><th>Rank</th><th>Email</th><th>Cookies</th></tr>
    </thead>
    <tbody id="leaderboardBody"></tbody>
  </table>
</div>

<!-- Firebase CDN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDZg1xwpJfFZg-eTahJI7qpCyjb92zD8cU",
  authDomain: "cookie-game-59893.firebaseapp.com",
  projectId: "cookie-game-59893",
  storageBucket: "cookie-game-59893.firebasestorage.app",
  messagingSenderId: "343163805191",
  appId: "1:343163805191:web:e7b69ec2a6958545f914a2",
  measurementId: "G-C7N55WLS6H"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);

let score = 0;
let userId = null;
let cookiesPerClick = 1;
let autoClicker = 0;
let autoClickInterval = null;

const clickUpgradeBase = 50;
const autoClickerBase = 100;

// Signup
window.signup = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Sign-up successful! Please log in.");
  } catch(e) {
    alert("Error: " + e.message);
  }
};

// Login
window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    alert("Error: " + e.message);
  }
};

// Logout
window.logout = async function() {
  await signOut(auth);
  location.reload();
};

// Load user and game
onAuthStateChanged(auth, async (user) => {
  if(user) {
    userId = user.uid;
    document.getElementById("auth").style.display = "none";
    document.getElementById("game").style.display = "block";
    document.getElementById("leaderboard").style.display = "block";
    document.getElementById("userEmail").textContent = user.email;

    const ref = doc(db, "users", userId);
    const snap = await getDoc(ref);
    if(snap.exists()) {
      score = snap.data().score || 0;
      cookiesPerClick = snap.data().cookiesPerClick || 1;
      autoClicker = snap.data().autoClicker || 0;
    } else {
      await setDoc(ref, { score: 0, cookiesPerClick: 1, autoClicker: 0, email: user.email });
    }

    updateScore();
    updateUpgradeCost();
    startAutoClicker();
    updateLeaderboard();
    setInterval(saveProgress, 5000);
    setInterval(updateLeaderboard, 10000);
  }
});

// Click cookie
window.clickCookie = function() {
  score += cookiesPerClick;
  updateScore();
};

// Buy upgrades
window.buyClickUpgrade = function() {
  const cost = Math.floor(clickUpgradeBase * cookiesPerClick);
  if(score >= cost) {
    score -= cost;
    cookiesPerClick++;
    updateScore();
    updateUpgradeCost();
  } else {
    alert("Not enough cookies!");
  }
};

window.buyAutoClicker = function() {
  const cost = Math.floor(autoClickerBase * (autoClicker + 1));
  if(score >= cost) {
    score -= cost;
    autoClicker++;
    updateScore();
    updateUpgradeCost();
    startAutoClicker();
  } else {
    alert("Not enough cookies!");
  }
};

// Auto clicker
function startAutoClicker() {
  if(autoClickInterval) clearInterval(autoClickInterval);
  if(autoClicker > 0) {
    autoClickInterval = setInterval(() => {
      score += autoClicker;
      updateScore();
    }, 1000);
  }
}

// Update UI
function updateScore() {
  document.getElementById("score").textContent = score;
}

function updateUpgradeCost() {
  document.getElementById("clickUpgradeCost").textContent = Math.floor(clickUpgradeBase * cookiesPerClick);
  document.getElementById("autoClickerCost").textContent = Math.floor(autoClickerBase * (autoClicker + 1));
}

// Save progress
async function saveProgress() {
  if(userId) {
    await setDoc(doc(db, "users", userId), {
      score,
      cookiesPerClick,
      autoClicker,
      email: document.getElementById("userEmail").textContent
    });
  }
}

// Leaderboard
async function updateLeaderboard() {
  const q = query(collection(db, "users"), orderBy("score", "desc"), limit(10));
  const snap = await getDocs(q);
  const tbody = document.getElementById("leaderboardBody");
  tbody.innerHTML = "";
  let rank = 1;
  snap.forEach(docSnap => {
    const data = docSnap.data();
    const row = `<tr><td>${rank}</td><td>${data.email}</td><td>${data.score}</td></tr>`;
    tbody.innerHTML += row;
    rank++;
  });
}

</script>
</body>
</html>
